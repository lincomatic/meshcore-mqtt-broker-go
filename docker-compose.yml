services:
  broker:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MQTT_WS_PORT:-2002}:${MQTT_WS_PORT:-2002}"
      - "${MQTT_WSS_PORT:-443}:${MQTT_WSS_PORT:-443}"
      - "${MQTT_MQTT_PORT:-1883}:${MQTT_MQTT_PORT:-1883}"
      - "${MQTT_MQTTS_PORT:-8883}:${MQTT_MQTTS_PORT:-8883}"
    volumes:
      - ./data:/data
    # Compose still publishes the four protocol ports; the broker only listens on modes configured in .env.
