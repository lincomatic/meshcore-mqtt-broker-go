services:
  broker:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    networks:
      - internal
    # Broker is internal-only; Caddy terminates TLS and proxies to MQTT_WS_PORT

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${MQTT_WS_PROXY_PORT}:${MQTT_WS_PROXY_PORT}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${SSL_CERT_PATH}:/certs/cert.pem:ro
      - ${SSL_KEY_PATH}:/certs/key.pem:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    environment:
      - SSL_CERT_PATH=/certs/cert.pem
      - SSL_KEY_PATH=/certs/key.pem
      - MQTT_WS_PORT=${MQTT_WS_PORT}
      - MQTT_WS_PROXY_PORT=${MQTT_WS_PROXY_PORT}
    networks:
      - internal
    depends_on:
      - broker

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
